services:
  - type: web
    name: aqua-project-agent-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend_api/requirements_backend.txt
    startCommand: uvicorn backend_api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
